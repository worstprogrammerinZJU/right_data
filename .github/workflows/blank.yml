name: HumanEval to ARM64 Assembly

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  generate-asm:
    runs-on: macos-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # 关键步骤：安装依赖库 Boost
      - name: Install Dependencies
        run: |
          brew install boost

      - name: Run Extraction
        run: |
          python extract.py
          if [ -d "src_code" ] && [ "$(ls -A src_code)" ]; then
            echo "Extraction successful."
          else
            echo "Extraction failed!"
            exit 1
          fi

      - name: Compile to ARM64 Assembly
        run: |
          mkdir -p generated_asm
          # 获取 Homebrew 安装的 boost 路径
          BOOST_INC=$(brew --prefix boost)/include
          
          find src_code -type f \( -name "*.c" -o -name "*.cpp" \) | while read file; do
            filename=$(basename "$file")
            base="${filename%.*}"
            ext="${filename##*.}"
            
            echo "Compiling $filename..."
            
            if [ "$ext" = "cpp" ]; then
              # 加入 -I $BOOST_INC 来解决 boost 找不到的问题
              clang++ -S -arch arm64 -O0 \
                -std=c++17 -stdlib=libc++ \
                -I "$BOOST_INC" \
                -fno-asynchronous-unwind-tables \
                "$file" -o "generated_asm/${base}.s"
            else
              clang -S -arch arm64 -O0 \
                -fno-asynchronous-unwind-tables \
                "$file" -o "generated_asm/${base}.s"
            fi
          done

      - name: Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: humaneval-arm64-asm
          path: generated_asm/
