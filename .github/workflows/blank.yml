name: HumanEval to ARM64 Assembly

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  generate-asm:
    runs-on: macos-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # 安装 Boost 和 OpenSSL
      - name: Install Dependencies
        run: |
          brew install boost openssl@3

      - name: Run Extraction
        run: |
          python extract.py
          if [ -d "src_code" ] && [ "$(ls -A src_code)" ]; then
            echo "Extraction successful."
          else
            echo "Extraction failed!"
            exit 1
          fi

      - name: Compile to ARM64 Assembly
        run: |
          mkdir -p generated_asm
          
          # 获取依赖库的包含路径
          BOOST_INC=$(brew --prefix boost)/include
          # OpenSSL 需要特别指定其在 Homebrew 中的路径
          OPENSSL_INC=$(brew --prefix openssl@3)/include
          
          find src_code -type f \( -name "*.c" -o -name "*.cpp" \) | while read file; do
            filename=$(basename "$file")
            base="${filename%.*}"
            ext="${filename##*.}"
            
            echo "Compiling $filename..."
            
            # 统一 C 和 C++ 的编译选项前缀
            COMMON_OPTS="-S -arch arm64 -O0 -fno-asynchronous-unwind-tables -I$BOOST_INC -I$OPENSSL_INC"
            
            if [ "$ext" = "cpp" ]; then
              clang++ $COMMON_OPTS -std=c++17 -stdlib=libc++ "$file" -o "generated_asm/${base}.s"
            else
              clang $COMMON_OPTS "$file" -o "generated_asm/${base}.s"
            fi
          done

      - name: Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: humaneval-arm64-asm
          path: generated_asm/
